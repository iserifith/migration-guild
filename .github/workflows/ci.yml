name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            migration/package-lock.json
            migration/ui/package-lock.json

      # Root tooling (tsup, tsx, typescript) — not strictly required for tests,
      # but keeps the workspace consistent with local dev.
      - name: Install root dependencies
        run: npm install

      - name: Install migration dependencies
        run: npm install
        working-directory: migration

      - name: Install migration/ui dependencies
        run: npm install
        working-directory: migration/ui

      - name: Test migration (registry CLI)
        run: npm test
        working-directory: migration

      - name: Test migration/ui (registry UI)
        run: npm test
        working-directory: migration/ui
